name: 4D Python

on:
  schedule:
    - cron: "1 12 * * 3,6,0"
  workflow_dispatch:

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install
        run: pip install pandas openpyxl requests

      - name: run python
        run: |
          python3 append_4D_result.py
          python3 4dbox_script.py

      - name: commit
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git pull --rebase origin main || true
          git add -f 4d_history_results.csv 4d_box_output.xlsx
          git diff --cached --quiet && exit 0
          git commit -m "python update"
          git push https://x-access-token:$PAT@github.com/${{ github.repository }} HEAD:main