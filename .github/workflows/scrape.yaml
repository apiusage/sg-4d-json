name: Scrape 4D
on:
  schedule:
    - cron: "40 10 * * 3,6,0"
    - cron: "50 10 * * 3,6,0"
    - cron: "0 11 * * 3,6,0"
    - cron: "10 11 * * 3,6,0"
    - cron: "25 11 * * 3,6,0"
    - cron: "0 12 * * 3,6,0"
    - cron: "1 12 * * 3,6,0"
  workflow_dispatch:
    inputs:
      task:
        description: "Which task to run?"
        required: true
        default: "scrape"
        type: choice
        options:
          - scrape
          - python

jobs:
  scrape4d:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          sudo apt update
          sudo apt install -y python3-pip
          pip3 install openpyxl pandas requests
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt install -y nodejs
          npm install

      - name: Run task
        env:
          SCHEDULE: ${{ github.event.schedule }}
          TASK: ${{ github.event.inputs.task }}
        run: |
          echo "Triggered by schedule: '$SCHEDULE'"
          echo "Manual input task: '$TASK'"
          if [[ "$SCHEDULE" == "1 12 * * 3,6,0" || "$TASK" == "python" ]]; then
            echo "Running Python scripts..."
            python3 4dbox_script.py
            python3 4d_results_predictor.py
            python3 4dscraping.py
          else
            echo "Running npm scrape..."
            npm run scrape
          fi

      - name: Commit & Push
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git pull --rebase origin main || true
          git add -f 4d_results.csv 4d_results_all.xlsx 4d_box_output.xlsx 4d.json || true
          git commit -m "Auto update" || echo "No changes"
          git push https://x-access-token:$PAT@github.com/${{ github.repository }} HEAD:main